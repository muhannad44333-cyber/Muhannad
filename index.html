
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giftly | مستقبل تجربة الإهداء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #A855F7;
        --secondary: #D8B4FE;
        --accent: #F3E8FF;
        --dark: #0F172A;
      }
      body {
        font-family: 'Cairo', sans-serif;
        scroll-behavior: smooth;
        background-color: #FAFAFF;
        color: #1E293B;
        overflow-x: hidden;
      }
      .mesh-bg {
        background-color: #FAFAFF;
        background-image: 
          radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(216, 180, 254, 0.05) 0px, transparent 50%);
      }
      .glass-morphism {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .premium-shadow {
        box-shadow: 0 25px 50px -12px rgba(168, 85, 247, 0.1);
      }
      .btn-gradient {
        background: linear-gradient(135deg, #A855F7 0%, #7E22CE 100%);
        transition: all 0.3s ease;
      }
      .btn-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4);
      }
      .card-hover {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover:hover {
        transform: translateY(-8px);
        border-color: #D8B4FE;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #D8B4FE;
        border-radius: 10px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
  </head>
  <body class="mesh-bg">
    <div id="root"></div>
  </body>
</html>
